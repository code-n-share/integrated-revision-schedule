<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English - Revision Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1976D2;
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --muted: #6B7280;
      --border: #E5E7EB;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 480px;
      margin: 24px;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    .card h1 {
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .card p { color: var(--muted); font-size: 16px; margin-bottom: 24px; }
    .home-btn {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 24px;
      border-radius: 100px;
      transition: opacity 0.2s;
    }
    .home-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128214;</div>
    <h1>English</h1>
    <p>This subject is coming soon. Check back later for English revision chapters.</p>
    <a href="../index.html" class="home-btn">&larr; Back to Home</a>
  </div>
</body>
</html>
